<div id="busy-modal" class="fixed inset-0 z-[100] hidden flex items-end sm:items-center justify-center">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeBusyModal()"></div>
    <div class="bg-surface w-full sm:w-[400px] sm:rounded-2xl rounded-t-2xl p-6 relative z-10 transform transition-transform shadow-2xl flex flex-col gap-4">
        <div class="flex justify-between items-center mb-2">
            <h3 class="font-headline-md text-headline-md text-on-surface">新增不可用時間</h3>
            <button class="text-on-surface-variant hover:bg-surface-container-low rounded-full p-1" onclick="closeBusyModal()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        
        <div id="busy-error" class="hidden bg-error-container text-on-error-container text-sm p-3 rounded-lg"></div>
        
        <div class="flex flex-col gap-1.5">
            <label class="font-label-md text-on-surface-variant">類型</label>
            <select id="busy-type" class="w-full bg-surface-container-low border-none rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary">
                <option value="club">社團</option>
                <option value="work">打工</option>
                <option value="other">其他</option>
            </select>
        </div>
        
        <div class="flex flex-col gap-1.5">
            <label class="font-label-md text-on-surface-variant">名稱</label>
            <input id="busy-name" type="text" placeholder="例如：吉他社、圖書館打工、家教" class="w-full bg-surface-container-low border-none rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary placeholder:text-outline"/>
        </div>
        
        <div class="flex flex-col gap-1.5">
            <label class="font-label-md text-on-surface-variant">星期</label>
            <select id="busy-day" class="w-full bg-surface-container-low border-none rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary">
                <option value="">請選擇</option>
                <option value="mon">週一</option>
                <option value="tue">週二</option>
                <option value="wed">週三</option>
                <option value="thu">週四</option>
                <option value="fri">週五</option>
            </select>
        </div>
        
        <div class="grid grid-cols-2 gap-3">
            <div class="flex flex-col gap-1.5">
                <label class="font-label-md text-on-surface-variant">開始節次</label>
                <select id="busy-start" class="w-full bg-surface-container-low border-none rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary">
                    <option value="0">第 1 節 (08:00)</option>
                    <option value="1">第 2 節 (09:00)</option>
                    <option value="2">第 3 節 (10:10)</option>
                    <option value="3">第 4 節 (11:10)</option>
                    <option value="4">第 5 節 (12:10)</option>
                    <option value="5">第 6 節 (13:10)</option>
                    <option value="6">第 7 節 (14:10)</option>
                    <option value="7">第 8 節 (15:10)</option>
                    <option value="8">第 9 節 (16:10)</option>
                    <option value="9">第 10 節 (17:10)</option>
                    <option value="10">第 A 節 (18:30)</option>
                    <option value="11">第 B 節 (19:30)</option>
                    <option value="12">第 C 節 (20:30)</option>
                    <option value="13">第 D 節 (21:30)</option>
                </select>
            </div>
            <div class="flex flex-col gap-1.5">
                <label class="font-label-md text-on-surface-variant">結束節次</label>
                <select id="busy-end" class="w-full bg-surface-container-low border-none rounded-lg p-3 text-body-md focus:ring-2 focus:ring-primary">
                    <option value="0">第 1 節 (09:00)</option>
                    <option value="1">第 2 節 (10:00)</option>
                    <option value="2">第 3 節 (11:00)</option>
                    <option value="3">第 4 節 (12:00)</option>
                    <option value="4">第 5 節 (13:00)</option>
                    <option value="5">第 6 節 (14:00)</option>
                    <option value="6">第 7 節 (15:00)</option>
                    <option value="7">第 8 節 (16:00)</option>
                    <option value="8">第 9 節 (17:00)</option>
                    <option value="9">第 10 節 (18:00)</option>
                    <option value="10">第 A 節 (19:20)</option>
                    <option value="11">第 B 節 (20:20)</option>
                    <option value="12">第 C 節 (21:20)</option>
                    <option value="13">第 D 節 (22:20)</option>
                </select>
            </div>
        </div>
        
        <button class="w-full bg-primary text-on-primary font-headline-md text-body-lg py-4 rounded-xl mt-2 active:scale-95 transition-transform" onclick="saveCustomBusy()">
            儲存
        </button>
    </div>
</div>

</div><script src="data/student.js"></script><script src="data/courses.js"></script><script src="data/groups.js"></script><script src="data/schedules.js"></script><script src="script.js"></script></body>
</html>
